<script>
(function() {
  const tip      = document.getElementById('tooltip');
  const ttName   = document.getElementById('tt-name');
  const ttSub    = document.getElementById('tt-sub');
  const ttMargin = document.getElementById('tt-margin');

  let activeEl = null;

  document.querySelectorAll('.dot').forEach(function(dot) {
    dot.addEventListener('mouseenter', function(e) {
      if (activeEl) {
        activeEl.setAttribute('r', '4.5');
      }
      activeEl = dot;
      dot.setAttribute('r', '7');
      const col = dot.getAttribute('data-color');
      ttName.textContent   = dot.getAttribute('data-name');
      ttName.style.color   = col;
      ttSub.textContent    = dot.getAttribute('data-sector') + ' · ' + dot.getAttribute('data-subcat');
      ttMargin.textContent = '5-yr avg margin: ' + dot.getAttribute('data-margin');
      ttMargin.style.color = col;
      tip.style.display = 'block';
      positionTip(e);
    });

    dot.addEventListener('mousemove', function(e) {
      positionTip(e);
    });

    dot.addEventListener('mouseleave', function() {
      dot.setAttribute('r', '4.5');
      activeEl = null;
      tip.style.display = 'none';
    });
  });

  function positionTip(e) {
    const pad = 14;
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    const w = tip.offsetWidth  || 220;
    const h = tip.offsetHeight || 70;
    if (x + w > window.innerWidth  - 8) x = e.clientX - w - pad;
    if (y + h > window.innerHeight - 8) y = e.clientY - h - pad;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }
})();
</script>
